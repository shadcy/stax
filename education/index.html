            function animate(time) {
                let dt = (time - lastTime) / 1000;
                lastTime = time;
                if (!time) dt = 0;
                if (dt > 0.1) dt = 0.016;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Devices (Left)
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.strokeStyle = '#2f2f2f';
                ctx.lineWidth = 1;
                roundRect(ctx, 20, 40, 100, 50, 6);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#a3a3a3';
                ctx.font = '11px Inter, sans-serif';
                ctx.fillText("SP804 Timer", 35, 70);

                roundRect(ctx, 20, 140, 100, 50, 6);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#a3a3a3';
                ctx.fillText("PL050 Keypad", 30, 170);

                // VIC (Center)
                roundRect(ctx, canvas.width / 2 - 60, 80, 120, 80, 6);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#ffffff';
                ctx.font = '11px Inter, sans-serif';
                ctx.fillText("VIC CONTROLLER", canvas.width / 2 - 45, 110);
                ctx.font = '10px Fira Code, monospace';
                ctx.fillStyle = '#10a37f';
                ctx.fillText("VICVECTADDR", canvas.width / 2 - 35, 135);

                // CPU Vector (Right)
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                roundRect(ctx, canvas.width - 150, 80, 130, 80, 6);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#a3a3a3';
                ctx.font = '11px Inter, sans-serif';
                ctx.fillText("CPU VECTOR TABLE", canvas.width - 140, 105);
                ctx.fillStyle = '#10a37f';
                ctx.font = '11px Fira Code, monospace';
                ctx.fillText("irq_dispatch()", canvas.width - 130, 135);

                // Draw connection pulses
                if (irqSource) {
                    progress += dt * 1.5;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;

                    let startX = 120;
                    let startY = irqSource === "timer" ? 65 : 165;
                    let targetX = canvas.width / 2 - 60;
                    let targetY = 120;

                    // Trace path to VIC
                    if (progress <= 0.5) {
                        let currentX = startX + (progress * 2) * (targetX - startX);
                        let currentY = startY + (progress * 2) * (targetY - startY);
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(currentX, currentY);
                        ctx.stroke();
                        ctx.fillStyle = '#10a37f';
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 3, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (progress <= 1) {
                        // Trace path to CPU Vector
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(targetX, targetY);
                        ctx.stroke();

                        let cpuX = canvas.width / 2 + 60;
                        let cpuTarget = canvas.width - 150;
                        let currentX = cpuX + ((progress - 0.5) * 2) * (cpuTarget - cpuX);

                        ctx.strokeStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.moveTo(cpuX, 120);
                        ctx.lineTo(currentX, 120);
                        ctx.stroke();
                        ctx.fillStyle = '#10a37f';
                        ctx.beginPath();
                        ctx.arc(currentX, 120, 3, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        handlerExecuting = true;
                    }

                    if (handlerExecuting) {
                        ctx.fillStyle = 'rgba(16, 163, 127, 0.2)'; // Success glow
                        ctx.fillRect(canvas.width - 150, 80, 130, 80);
                        ctx.fillStyle = '#10a37f';
                        ctx.font = '11px Inter, sans-serif';
                        ctx.fillText("ISR EXECUTED!", canvas.width - 125, 155);

                        setTimeout(() => { irqSource = null; handlerExecuting = false; }, 800);
                    }
                }

                simAnimationId = requestAnimationFrame(animate);
            }
            animate();
        }

        // E. Drivers Visualizer
        function drawDriversSim(controls) {
            controls.innerHTML = `
                <div style="font-size: 12px; color: #a3a3a3; font-family: Inter, sans-serif;">
                    Type inside the input to simulate KMI_DATA MMIO register buffer:
                </div>
                <input type="text" id="driverKbInput" class="api-input" style="width: 200px" placeholder="Type here..." oninput="simulateDriverRegs()">
            `;

            let registers = {
                KMI_CR: "0x00000004 (Enabled)",
                KMI_STAT: "0x00000000 (Empty)",
                KMI_DATA: "0x00000000"
            };

            window.simulateDriverRegs = () => {
                const val = document.getElementById('driverKbInput').value;
                if (val.length > 0) {
                    const char = val[val.length - 1];
                    const sc = char.charCodeAt(0).toString(16).toUpperCase();
                    registers.KMI_STAT = "0x00000010 (RXFULL)";
                    registers.KMI_DATA = `0x000000${sc} ('${char}')`;
                } else {
                    registers.KMI_STAT = "0x00000000 (Empty)";
                    registers.KMI_DATA = "0x00000000";
                }
            };

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Display registers in MMIO Block
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.strokeStyle = '#2f2f2f';
                ctx.lineWidth = 1;
                roundRect(ctx, 40, 40, canvas.width - 80, 160, 6);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#a3a3a3';
                ctx.font = '11px Inter, sans-serif';
                ctx.fillText("PL050 MEMORY-MAPPED REGISTERS (BASE: 0x10006000)", 60, 65);

                ctx.font = '13px Fira Code, monospace';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(`KMI_CR   [0x10006000] : ${registers.KMI_CR}`, 60, 105);
                ctx.fillStyle = '#4d4d4d';
                ctx.fillText(`KMI_STAT [0x10006004] : ${registers.KMI_STAT}`, 60, 135);
                ctx.fillStyle = '#10a37f';
                ctx.fillText(`KMI_DATA [0x10006008] : ${registers.KMI_DATA}`, 60, 165);

                simAnimationId = requestAnimationFrame(animate);
            }
            animate();
        }

        // F. FAT16 Visualizer
        function drawFAT16Sim(controls) {
            controls.innerHTML = `<button class="sim-btn" onclick="simulateClusterChain()">Traversal Chain</button>`;

            let activeNode = -1;
            let displayActiveX = 40; // For smooth highlight moving

            window.simulateClusterChain = () => {
                activeNode = 0;
                displayActiveX = 40;
                let interval = setInterval(() => {
                    activeNode++;
                    if (activeNode >= 4) {
                        clearInterval(interval);
                        setTimeout(() => { activeNode = -1; }, 1000);
                    }
                }, 800);
            };

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.font = '11px Inter, sans-serif';
                ctx.fillStyle = '#a3a3a3';
                ctx.fillText("FAT16 File Cluster Chains (BG.BMP: Size 614KB)", 40, 30);

                // Clusters
                const nodes = [
                    { label: "Root Record", text: "BG.BMP: Clus 5" },
                    { label: "Cluster 5", text: "Blocks [0-32KB]" },
                    { label: "Cluster 6", text: "Blocks [32-64KB]" },
                    { label: "Cluster 7", text: "End (0xFFFF)" }
                ];

                if (activeNode >= 0 && activeNode < 4) {
                    let targetX = 40 + activeNode * (canvas.width - 120) / 3;
                    displayActiveX += (targetX - displayActiveX) * 0.15;
                    ctx.fillStyle = 'rgba(16, 163, 127, 0.2)'; // glowing highlight
                    roundRect(ctx, displayActiveX - 5, 75, 110, 70, 6);
                    ctx.fill();
                }

                nodes.forEach((n, idx) => {
                    let x = 40 + idx * (canvas.width - 120) / 3;
                    let y = 100;

                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.strokeStyle = (activeNode === idx) ? '#10a37f' : '#2f2f2f';
                    ctx.lineWidth = 1;
                    roundRect(ctx, x, y - 20, 100, 60, 6);
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 11px Inter, sans-serif';
                    ctx.fillText(n.label, x + 8, y + 5);
                    ctx.fillStyle = '#a3a3a3';
                    ctx.font = '9px Fira Code, monospace';
                    ctx.fillText(n.text, x + 8, y + 25);

                    // Draw connecting arrows
                    if (idx < nodes.length - 1) {
                        ctx.strokeStyle = '#4d4d4d';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x + 100, y + 10);
                        ctx.lineTo(x + (canvas.width - 120) / 3, y + 10);
                        ctx.stroke();

                        // Arrow head
                        ctx.beginPath();
                        ctx.moveTo(x + (canvas.width - 120) / 3, y + 10);
                        ctx.lineTo(x + (canvas.width - 120) / 3 - 5, y + 5);
                        ctx.lineTo(x + (canvas.width - 120) / 3 - 5, y + 15);
                        ctx.fill();
                    }
                });

                simAnimationId = requestAnimationFrame(animate);
            }
            animate();
        }

        // G. Window Manager Visualizer
        function drawWMSim(controls) {
            controls.innerHTML = `<span style="font-size: 11px; color: #a3a3a3; font-family: Inter, sans-serif;">Drag windows inside the simulated screen:</span>`;

            let wins = [
                { x: 30, y: 50, targetX: 30, targetY: 50, w: 120, h: 90, title: "DOOM" },
                { x: 140, y: 90, targetX: 140, targetY: 90, w: 140, h: 100, title: "File Manager" },
                { x: 220, y: 40, targetX: 220, targetY: 40, w: 130, h: 80, title: "Terminal" }
            ];
            let activeWin = null;
            let dragOffset = { x: 0, y: 0 };

            canvas.onmousedown = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;

                for (let i = wins.length - 1; i >= 0; i--) {
                    let w = wins[i];
                    if (mx >= w.x && mx < w.x + w.w && my >= w.y && my < w.y + w.h) {
                        activeWin = w;
                        wins.splice(i, 1);
                        wins.push(w);
                        dragOffset.x = mx - w.targetX;
                        dragOffset.y = my - w.targetY;
                        break;
                    }
                }
            };

            canvas.onmousemove = (e) => {
                if (!activeWin) return;
                const rect = canvas.getBoundingClientRect();
                activeWin.targetX = (e.clientX - rect.left) - dragOffset.x;
                activeWin.targetY = (e.clientY - rect.top) - dragOffset.y;
            };

            canvas.onmouseup = () => { activeWin = null; };
            canvas.onmouseleave = () => { activeWin = null; };

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw Windows
                wins.forEach(w => {
                    // Smooth spring interpolation
                    w.x += (w.targetX - w.x) * 0.2;
                    w.y += (w.targetY - w.y) * 0.2;

                    ctx.fillStyle = 'rgba(0,0,0,0.85)';
                    ctx.strokeStyle = '#2f2f2f';
                    ctx.lineWidth = 1;

                    // Add subtle shadow
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 10;
                    ctx.shadowOffsetY = 4;

                    roundRect(ctx, w.x, w.y, w.w, w.h, 6);
                    ctx.fill();
                    ctx.stroke();

                    // reset shadow
                    ctx.shadowColor = 'transparent';

                    // Title bar line
                    ctx.strokeStyle = '#2f2f2f';
                    ctx.beginPath();
                    ctx.moveTo(w.x, w.y + 20);
                    ctx.lineTo(w.x + w.w, w.y + 20);
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.font = '500 11px Inter, sans-serif';
                    ctx.fillText(w.title, w.x + 8, w.y + 14);
                });

                ctx.fillStyle = 'rgba(16, 163, 127, 0.15)';
                ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
                ctx.fillStyle = '#10a37f';
                ctx.font = '10px Fira Code, monospace';
                ctx.fillText("COMPOSITOR ACTIVE: z-list composited off-screen.", 20, canvas.height - 10);

                simAnimationId = requestAnimationFrame(animate);
            }
            animate();
        }

        // H. lwIP Networking Visualizer
        function drawLwIPSim(controls) {
            controls.innerHTML = `<button class="sim-btn" onclick="startPacketTx()">Fetch HTTP</button>`;

            let packetY = 50;
            let displayPacketY = 50;
            let packetActive = false;
            let lastTime = performance.now();

            window.startPacketTx = () => {
                packetActive = true;
                packetY = 50;
                displayPacketY = 50;
                lastTime = performance.now();
            };

            function animate(time) {
                let dt = (time - lastTime) / 1000;
                lastTime = time;
                if (!time) dt = 0;
                if (dt > 0.1) dt = 0.016;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw Stack Layers
                const layers = [
                    { name: "Application (HTTP API)", y: 50 },
                    { name: "Transport (TCP Stack)", y: 100 },
                    { name: "Network (IP Routing)", y: 150 },
                    { name: "Link (SMC91C111 Driver)", y: 200 }
                ];

                layers.forEach(l => {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.strokeStyle = '#2f2f2f';
                    ctx.lineWidth = 1;
                    roundRect(ctx, canvas.width / 2 - 120, l.y - 15, 240, 30, 6);
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#a3a3a3';
                    ctx.font = '11px Inter, sans-serif';
                    ctx.fillText(l.name, canvas.width / 2 - 80, l.y + 4);
                });

                // Packet animation
                if (packetActive) {
                    packetY += dt * 150; // pixels per second
                    displayPacketY += (packetY - displayPacketY) * 0.2; // smooth trailing

                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(canvas.width / 2, displayPacketY, 5, 0, Math.PI * 2);
                    ctx.fill();

                    // Glow
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath();
                    ctx.arc(canvas.width / 2, displayPacketY, 10, 0, Math.PI * 2);
                    ctx.fill();

                    if (displayPacketY >= 230) {
                        packetActive = false;
                    }
                }

                simAnimationId = requestAnimationFrame(animate);
            }
            animate();
        }

        // I. Allocator Visualizer
        function drawAllocatorSim(controls) {
            controls.innerHTML = `
                <button class="sim-btn" onclick="simAllocate()">Allocate Memory</button>
                <button class="sim-btn" onclick="simFree()">Free All (Reset)</button>
            `;

            let memoryBlocks = [];
            let totalMemory = 800; // Visual units
            let currentPointer = 0;
            let displayPointer = 0;
            const modernColors = ['#ffffff', '#a3a3a3', '#10a37f', '#4d4d4d', '#ececec'];

            window.simAllocate = () => {
                let size = Math.floor(Math.random() * 80) + 20; // 20 to 100
                if (currentPointer + size > totalMemory) {
                    alert("Out of Memory! (Kernel Panic)");
                    return;
                }
                memoryBlocks.push({
                    x: currentPointer,
                    w: 0,
                    targetW: size,
                    color: modernColors[memoryBlocks.length % modernColors.length]
                });
                currentPointer += size;
            };

            window.simFree = () => {
                memoryBlocks = [];
                currentPointer = 0;
            };

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                displayPointer += (currentPointer - displayPointer) * 0.15;

                // Draw Heap Container
                let padding = 40;
                let heapWidth = canvas.width - (padding * 2);
                let heapHeight = 60;
                let heapY = 100;

                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.strokeStyle = '#2f2f2f';
                ctx.lineWidth = 1;
                roundRect(ctx, padding, heapY, heapWidth, heapHeight, 6);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#a3a3a3';
                ctx.font = '12px Inter, sans-serif';
                ctx.fillText("SYSTEM HEAP (0x00200000 - 0x01E00000)", padding, heapY - 10);

                // Draw Blocks
                let visualRatio = heapWidth / totalMemory;

                memoryBlocks.forEach(b => {
                    b.w += (b.targetW - b.w) * 0.15; // Smooth interpolation
                    ctx.fillStyle = b.color;
                    ctx.fillRect(padding + (b.x * visualRatio), heapY + 1, b.w * visualRatio, heapHeight - 2);

                    // Separator line
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(padding + (b.x * visualRatio) + (b.w * visualRatio), heapY + 1);
                    ctx.lineTo(padding + (b.x * visualRatio) + (b.w * visualRatio), heapY + heapHeight - 1);
                    ctx.stroke();
                });

                // Draw Bump Pointer
                let ptrX = padding + (displayPointer * visualRatio);
                ctx.strokeStyle = '#10a37f';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ptrX, heapY - 10);
                ctx.lineTo(ptrX, heapY + heapHeight + 10);
                ctx.stroke();

                ctx.fillStyle = '#10a37f';
                ctx.font = '11px Fira Code, monospace';
                ctx.fillText("heap_ptr", ptrX - 25, heapY + heapHeight + 25);

                simAnimationId = requestAnimationFrame(animate);
            }
            animate();
        }

        // Helper: drawing rounded rectangles in Canvas
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function varColor(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        function filterConcepts() {
            const term = document.getElementById('conceptSearch').value.toLowerCase();
            const nav = document.getElementById('conceptNav');
            const btns = nav.getElementsByClassName('concept-btn');
            for (let btn of btns) {
                const text = btn.textContent.toLowerCase();
                if (text.includes(term)) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            }
        }

        function copyActiveCode() {
            const activeTab = document.querySelector('.code-tab.active');
            if (!activeTab) return;
            const filename = activeTab.textContent.trim();

            const currentSubsystem = subsystems.find(s => s.id === window.currentConceptId);
            if (!currentSubsystem) return;

            const file = currentSubsystem.files.find(f => f.name === filename);
            if (!file) return;

            navigator.clipboard.writeText(file.code).then(() => {
                const btn = document.getElementById('copyCodeBtn');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                btn.style.backgroundColor = varColor('--success');
                setTimeout(() => {
                    btn.innerHTML = orig;
                    btn.style.backgroundColor = '';
                }, 2000);
            });
        }
    </script>
